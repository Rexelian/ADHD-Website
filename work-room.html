<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Board Prototype</title>
    <link rel="stylesheet" href="css/style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"/>
</head>
<body>
    <div class="container-alx">
        <div id="topbar">
            <header>
                <img src="img/workbudz-logo.svg" alt="" id="workbudz-logo">
                <h1>WorkBudz</h1>  
            </header>
            <div id="nav-menu">
                <ul>
                    <li><button id="taskNav"><img src="img/tasks_icon.svg" height="40vh"></button></li>
                    <li><button id="wrNav"><img src="img/workroom_icon.svg" height="40vh"></button></li>
                    <li><button id="shopNav"><img src="img/shop_icon.svg" height="40vh"></button></li>
                    <li><button id="collNav"><img src="img/collection_icon.svg" height="40vh"></button></li>
                    <li><button id="settNav"><img src="img/settings_icon.svg" alt="" height="40vh"></button></li>
                </ul>
            </div>
        </div>
        <div id="main">
            
            <main class="content-alx">
                
            </main>
        </div>
        <div id="foot">
            <footer>
                <p>WorkBudz © 2026 — Created by Alexander Lee. </p>
            </footer>
        </div>
    </div>

    <script src="js/script.js" defer></script>
</body>
</html>
