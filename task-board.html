<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Board Prototype</title>
    <link rel="stylesheet" href="css/style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"/>
</head>
<body>
    <div class="container-alx">
        <div id="topbar">
            <header>
                <h1>WorkBudz</h1>  
            </header>
            
            <div id="nav-menu">
            <ul>
                <li><a href="index.html">home</a></li>
                <li><a href="task-board.html">task board</a></li>
                <li><a href="work-room.html">work room</a></li>
                <li><a href="shop.html">shop</a></li>
                <li><a href="plushie-room.html">plushie room</a></li>
            </ul>

            </div>
        
        </div>
        <div id="main">
            <!--change aside to ordered div elements-->
            <aside class="sidebar-alx">
                <!--change these to buttons-->
                <!--this search bar will be connected to a data storage of some sort (figuring out hosting vs local storage)-->
                <input type="search" placeholder="Search tasks..." id="search">
                <!--work on writing js for buttons; second priority--requires task data storage-->
                <div id="taskCntr">
                    <div>Current Tasks</div>
                    <div id="counter" class="counter">0</div>
                </div>
                <button class="sortBtn">Task Status</button>
                <button class="sortBtn">Task Sorting</button>
                <button class="sortBtn">Task History</button>
                <button class="sortBtn" onclick="clearAllTasks()">Clear All Tasks</button>
            </aside>
            <main class="content-alx">
                <div id="class-create-container">
                    <button id="createTaskBtn">Create Task</button>
                    <div id="task-menu">
                        <input type="text" id="taskInput" placeholder="New task...">
                        <input type="text" id="dateInput" placeholder="Enter Due Date">
                        <input type="text" id="descInput" placeholder="Enter Description">
                        <button id="addTaskBtn">Add Task</button>
                        <!--Write js to populate the canvas with divs-->
                    </div>
                
                </div>
                
                <div id="board" data-label="canvas">
                    <div data-label="prototype-task">
                        <div>task</div>
                    </div>
                </div>
                <!--considering putting a button to select a random task to start on; not top priority-->
                <!--<button>random</button>-->

            </main>
        </div>
        <div id="foot">
            <footer>
                <p>WorkBudz © 2026 — Created by Alexander Lee. </p>
            </footer>
        </div>
    </div>

    <script src="js/script.js" defer></script>
</body>
</html>
